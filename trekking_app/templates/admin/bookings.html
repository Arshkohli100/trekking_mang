{% extends 'base.html' %}
{% block title %}All Bookings{% endblock %}
{% block content %}
<h3>All Bookings</h3>
<table class="table table-bordered">
    <thead><tr><th>ID</th><th>User</th><th>Trek</th><th>Date</th><th>Status</th></tr></thead>
    <tbody>
    {% for b in bookings %}
    <tr>
        <td>{{ b.id }}</td>
        <td>{{ b.user_name }}</td>
        <td>{{ b.trek_name }}</td>
        <td>{{ b.booking_date }}</td>
        <td>{{ b.status }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
